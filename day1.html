<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 1 Detail | Meredith and Adi NYC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-day="1">
  <div class="bg"></div>
  <header class="hero left-align">
    <p class="eyebrow">Day 1 Detail</p>
    <h1>Midtown + Central Park + Theater Night</h1>
    <p class="subtitle">Detailed plan by budget with maps, images, and local strategy.</p>
    <a class="back-link" href="index.html">Back to main itinerary</a>
  </header>
  <main class="container left-align">
    <section class="controls">
      <div class="control-row">
        <label for="budgetLevel">Trip budget:</label>
        <select id="budgetLevel">
          <option value="budget">Budget</option>
          <option value="standard">Standard</option>
          <option value="premium">Premium</option>
        </select>
      </div>
      <p id="budgetOutput" class="budget-output"></p>
    </section>
    <section class="day-card time-card" data-section="morning"><h3>Morning</h3><ul id="morningList"></ul></section>
    <section class="day-card time-card" data-section="afternoon"><h3>Afternoon</h3><ul id="afternoonList"></ul></section>
    <section class="day-card time-card" data-section="date"><h3>Date Night</h3><ul id="dateList"></ul></section>
    <section class="tips time-card" data-section="insider"><h3>NYC Insider Info</h3><ul id="insiderList"></ul></section>
    <section class="controls">
      <div class="section-switch">
        <button class="section-btn active" data-section="morning">Morning</button>
        <button class="section-btn" data-section="afternoon">Afternoon</button>
        <button class="section-btn" data-section="date">Date Night</button>
        <button class="section-btn" data-section="insider">Insider</button>
      </div>
    </section>
    <section class="day-card">
      <h3 id="mediaTitle">Map + Photos: Morning</h3>
      <iframe id="detailMap" class="map-frame" loading="lazy" src="https://maps.google.com/maps?q=Bryant%20Park%20New%20York&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
    </section>
    <section class="day-card">
      <h3>Major Spots</h3>
      <div id="photoGrid" class="photo-grid"></div>
    </section>
  </main>
  <script src="detail.js"></script>
</body>
</html>
